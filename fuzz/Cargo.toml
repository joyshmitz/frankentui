[package]
name = "ftui-fuzz"
version = "0.0.0"
authors = ["Automatically generated"]
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
arbitrary = { version = "1", features = ["derive"] }

[dependencies.ftui-core]
path = "../crates/ftui-core"

[dependencies.ftui-text]
path = "../crates/ftui-text"

[dependencies.ftui-style]
path = "../crates/ftui-style"

[dependencies.ftui-layout]
path = "../crates/ftui-layout"

[dependencies.ftui-render]
path = "../crates/ftui-render"

[dependencies.ftui-widgets]
path = "../crates/ftui-widgets"

[dependencies.ftui-pty]
path = "../crates/ftui-pty"

[[bin]]
name = "fuzz_input_parser"
path = "fuzz_targets/fuzz_input_parser.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_input_parser_structured"
path = "fuzz_targets/fuzz_input_parser_structured.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_input_parser_long_seq"
path = "fuzz_targets/fuzz_input_parser_long_seq.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_vt_parser"
path = "fuzz_targets/fuzz_vt_parser.rs"
test = false
doc = false
bench = false

## NOTE: fuzz_grid_mutations was removed from the active target set because the
## old frankenterm-core grid/cursor API is no longer vendored in this workspace.
## Rewrite it against the current grid API before re-adding it here.

[[bin]]
name = "fuzz_text_cluster_map"
path = "fuzz_targets/fuzz_text_cluster_map.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_text_shaped_layout"
path = "fuzz_targets/fuzz_text_shaped_layout.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_text_wrap"
path = "fuzz_targets/fuzz_text_wrap.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_text_width"
path = "fuzz_targets/fuzz_text_width.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_text_hyphenation"
path = "fuzz_targets/fuzz_text_hyphenation.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_layout_constraints"
path = "fuzz_targets/fuzz_layout_constraints.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_widget_render"
path = "fuzz_targets/fuzz_widget_render.rs"
test = false
doc = false
bench = false

[profile.release]
opt-level = 3
debug = true
